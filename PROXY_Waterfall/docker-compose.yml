version: '3.8'

services:
  waterfall:
    build: .
    container_name: freesia-waterfall
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-25565}:25565"
    env_file:
      - .env
    volumes:
      - ./plugins:/proxy/plugins
      - ./modules:/proxy/modules
      - ./config.yml:/proxy/config.yml
      - ./waterfall.yml:/proxy/waterfall.yml
      - ./locations.yml:/proxy/locations.yml
      # Map the security folder to the host for certificate access
      - ./plugins/Freesia/security:/proxy/plugins/Freesia/security
