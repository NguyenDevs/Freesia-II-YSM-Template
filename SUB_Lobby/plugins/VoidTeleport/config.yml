    - "&8&l&m------------------------------------"

usage:
  toggle: "%prefix &eSử dụng: &c/vt toggle [world]"
  offset: "%prefix &eSử dụng: &c/vt offset <world> <y>"
  setspawn: "%prefix &eSử dụng: &c/vt setspawn [world]"
