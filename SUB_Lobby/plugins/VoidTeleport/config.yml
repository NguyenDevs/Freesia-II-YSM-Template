  nether: "%prefix &eSử dụng: &c/vt nether <world> <true/false>"

player-teleported: "%prefix &7Bạn đã được dịch chuyển trở lại!"

nether-message: "%prefix &cBạn không được vượt qua tầng trên của nether!"

empty-list: "%prefix &7Không tìm thấy điều kiện. &eSử dụng: &c/vt setspawn <worldName> &7để bắt đầu cài đặt!"

world-spawnpoint-notset: "%prefix &cTrước khi kích hoạt VoidTeleport, bạn phải set spawnpoint cho thế giới đó."

offset-set: "%prefix &7Đã thiết lập spawnpoint offset tại %offset cho thế giới %world."

setspawn-success: "%prefix &7Đã thiết lập spawnpoint &athành công&7."

keepinventory-success: "%prefix &7KeepInventory đã thiết lập &athành công&7."

nether-world: "%prefix &7Bạn không thể sửa thiết lập này cho nether."

nether-success: "%prefix &7Nether đã thiết lập &athành công&7."

nether-unsuccess: "%prefix &cThế giới %world không phải là nether."

nether-already-disabled: "%prefix &cNether đã được vô hiệu hoá."

reload-success: "%prefix &7Đã tải lại cấu hình thành công!"

voidteleport-enabled: "%prefix &7Bạn đã kích hoạt VoidTeleport ở thế giới %world"

voidteleport-disabled: "%prefix &7Bạn đã vô hiệu VoidTeleport ở thế giới %world"

only-player: "%prefix &cChỉ có thể thực thi câu lệnh này bởi người chơi."

no-permission: "%prefix &cBạn không có quyền làm điều này."

spawnpoint-notset: "%prefix &cChưa thiết lập spawnpoint. &eSử dụng: &c/vt setspawn <worldname>."

world-not-enabled: "%prefix &cThế giới %world chưa được tải! &eSử dụng: '/vt setspawn/toggle %world' để bắt đầu cài đặt."

world-not-exists: "%prefix &cThế giới không tồn tại. Vui lòng kiểm tra lại!"