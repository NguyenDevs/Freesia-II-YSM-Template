# =============================================================
# docker-compose.yml — Freesia PROXY_Velocity
# =============================================================

version: "3.9"

services:
  velocity:
    build:
      context: .
      dockerfile: Dockerfile
    image: freesia/proxy-velocity:1.0.0
    container_name: freesia-velocity
    restart: unless-stopped
    tty: true
    stdin_open: true
    
    networks:
      - freesia-network

    ports:
      - "${PROXY_PORT:-25565}:25565/tcp"
      - "${PROXY_PORT:-25565}:25565/udp"
      - "${PROXY_FREESIA_PORT:-19200}:19200"

    env_file:
      - .env

    volumes:
      - ./lang:/proxy/lang
      - ./logs:/proxy/logs
      - ./plugins:/proxy/plugins
      - ./velocity.toml:/proxy/velocity.toml
      - ./forwarding.secret:/proxy/forwarding.secret
      - ./plugins/Freesia/security:/proxy/plugins/Freesia/security

networks:
  freesia-network:
    external: true
