version: '3.8'

services:
  velocity:
    build: .
    container_name: freesia-velocity
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-25565}:25565/tcp"
      - "${PROXY_PORT:-25565}:25565/udp"
      - "19200:19200"
    env_file:
      - .env
    volumes:
      - ./plugins:/proxy/plugins
      - ./logs:/proxy/logs
      - ./velocity.toml:/proxy/velocity.toml
      - ./forwarding.secret:/proxy/forwarding.secret
      # Map the security folder to the host for certificate access
      - ./plugins/Freesia/security:/proxy/plugins/Freesia/security
